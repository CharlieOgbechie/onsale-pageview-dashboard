name: Sync onsale page-view data

on:
  # Automatic schedule disabled: this path needs a Google Cloud service
  # account (GDRIVE_SERVICE_ACCOUNT_JSON / GDRIVE_FOLDER_ID / ANTHROPIC_API_KEY
  # secrets) that isn't set up -- see README "Advanced" section. The live
  # dashboard is currently synced by a Cowork scheduled task instead, which
  # doesn't need this workflow at all. Re-enable the schedule block below if
  # IT ever provisions a GCP project and you switch to this path.
  # schedule:
  #   - cron: "0 */6 * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab, once secrets are set

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/sync_data.py

      - name: Commit updated data
        run: |
          git config user.name "onsale-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/onsales.json data/insights.json data/_sync_manifest.json
          git diff --quiet --cached || git commit -m "Sync onsale data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
