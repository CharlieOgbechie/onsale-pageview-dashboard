<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Onsale Page View Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --muted: #9aa2b1;
    --accent: #6ea8fe;
    --accent-2: #f2b84b;
    --good: #4fd18b;
    --bad: #f27272;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
  }
  header h1 { font-size: 19px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    padding: 20px 28px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }
  select, input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
  }
  .chart-wrap { position: relative; height: 360px; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 6px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  tr:hover td { background: var(--panel-2); }
  .tier-megastar { color: #f27272; }
  .tier-superstar { color: var(--accent-2); }
  .tier-headliner { color: #f2e26b; }
  .tier-rising { color: var(--good); }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 12px; }
  .insight {
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    margin-bottom: 12px;
    background: var(--panel-2);
    border-radius: 0 6px 6px 0;
  }
  .insight h4 { margin: 0 0 4px; font-size: 13px; }
  .insight p { margin: 0; font-size: 12.5px; color: var(--muted); line-height: 1.4; }
  .empty { color: var(--muted); font-size: 13px; padding: 12px 0; }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .anomaly-badge { border-color: var(--bad); color: var(--bad); }
  .compare-picker {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .compare-picker input {
    flex: 1;
    min-width: 160px;
  }
  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 6px 4px 10px;
    font-size: 12.5px;
  }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .chip button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
  }
  .chip button:hover { color: var(--text); }
  .compare-hint { font-size: 12px; color: var(--muted); }
  .comparison-summary { margin: -4px 0 18px; }
  .comparison-summary .artist-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .comparison-summary .artist-line:last-of-type { border-bottom: none; }
  .comparison-summary .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .comparison-summary .artist-name { font-weight: 600; min-width: 130px; }
  .comparison-summary .artist-stats { color: var(--muted); }
  .comparison-summary .takeaway {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--panel-2);
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Onsale Page View Comparison Dashboard</h1>
    <div class="sub">Page views &amp; queue demand across Live Nation onsales/shows</div>
  </div>
  <div class="sub" id="lastSynced">Loading…</div>
</header>

<main>
  <div class="panel">
    <p class="section-title">Compare shows</p>

    <div class="compare-picker">
      <span class="compare-hint">Compare artists:</span>
      <input list="artistList" id="compareInput" placeholder="Type an artist name and press Enter… (up to 5)" />
      <datalist id="artistList"></datalist>
      <div id="compareChips" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
    </div>

    <div class="filters">
      <input id="searchBox" placeholder="Or just search/browse all shows…" />
      <select id="metricSelect">
        <option value="edp">EDP views (event page)</option>
        <option value="adp">ADP views (artist page)</option>
        <option value="onsale_peak_queue">Onsale peak queue</option>
        <option value="presale_peak_queue">Presale peak queue</option>
      </select>
      <select id="hourSelect"></select>
      <select id="tierSelect">
        <option value="">All tiers</option>
        <option value="megastar">Megastar</option>
        <option value="superstar">Superstar</option>
        <option value="headliner">Headliner</option>
        <option value="rising">Rising / Niche</option>
      </select>
      <select id="yearSelect"><option value="">All years</option></select>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);">
        <input type="checkbox" id="excludeAnomalies" checked style="width:auto;" /> exclude anomalies
      </label>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>

    <div id="comparisonSummary" class="panel comparison-summary" style="display:none;"></div>

    <p class="section-title" style="margin-top:24px;">All shows</p>
    <table id="dataTable">
      <thead>
        <tr>
          <th data-key="artist">Artist</th>
          <th data-key="venue">Venue</th>
          <th data-key="city">City</th>
          <th data-key="year">Year</th>
          <th data-key="tier">Tier</th>
          <th data-key="edp">EDP views</th>
          <th data-key="adp">ADP views</th>
          <th data-key="presale_peak_queue">Presale Q</th>
          <th data-key="onsale_peak_queue">Onsale Q</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="panel">
    <p class="section-title">Claude analysis</p>
    <div id="insights"><div class="empty">Loading insights…</div></div>
  </div>
</main>

<script>
const state = { onsales: [], insights: null, sort: { key: 'edp', dir: 'desc' }, compareArtists: [] };
const COMPARE_PALETTE = ['#6ea8fe', '#f2b84b', '#4fd18b', '#f27272', '#c792ea'];
const MAX_COMPARE = 5;

function artistColor(artist) {
  const idx = state.compareArtists.indexOf(artist);
  return idx === -1 ? '#6ea8fe' : COMPARE_PALETTE[idx % COMPARE_PALETTE.length];
}

function maxHourKey(record, field) {
  const obj = record[field] || {};
  const keys = Object.keys(obj).map(Number).filter(n => !isNaN(n));
  return keys.length ? Math.max(...keys) : null;
}

function valueAtHour(record, field, hour) {
  const obj = record[field] || {};
  if (hour === 'max') {
    const k = maxHourKey(record, field);
    return k === null ? null : obj[String(k)];
  }
  return obj[String(hour)] ?? null;
}

function metricValue(record, metric, hour) {
  if (metric === 'edp') return valueAtHour(record, 'edp_views_by_hour', hour);
  if (metric === 'adp') return valueAtHour(record, 'adp_views_by_hour', hour);
  if (metric === 'presale_peak_queue') return record.presale_peak_queue;
  if (metric === 'onsale_peak_queue') return record.onsale_peak_queue;
  return null;
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString();
}

function populateHourOptions() {
  const hourSelect = document.getElementById('hourSelect');
  const hours = new Set();
  state.onsales.forEach(r => {
    Object.keys(r.edp_views_by_hour || {}).forEach(h => hours.add(Number(h)));
    Object.keys(r.adp_views_by_hour || {}).forEach(h => hours.add(Number(h)));
  });
  const sorted = [...hours].sort((a, b) => a - b);
  hourSelect.innerHTML = '<option value="max">Peak available</option>' +
    sorted.map(h => `<option value="${h}">at +${h}h</option>`).join('');
}

function populateYearOptions() {
  const yearSelect = document.getElementById('yearSelect');
  const years = [...new Set(state.onsales.map(r => r.year).filter(Boolean))].sort((a, b) => b - a);
  years.forEach(y => {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    yearSelect.appendChild(opt);
  });
}

function filteredRecords() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const tier = document.getElementById('tierSelect').value;
  const year = document.getElementById('yearSelect').value;
  const excludeAnomalies = document.getElementById('excludeAnomalies').checked;
  const comparing = state.compareArtists.length > 0;
  return state.onsales.filter(r => {
    if (excludeAnomalies && r.anomaly) return false;
    if (r.is_comparable_reference) return false;
    if (tier && r.tier !== tier) return false;
    if (year && String(r.year) !== year) return false;
    if (comparing) {
      return state.compareArtists.includes(r.artist);
    }
    if (q) {
      const hay = `${r.artist} ${r.venue} ${r.city}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function populateArtistOptions() {
  const list = document.getElementById('artistList');
  const artists = [...new Set(state.onsales.filter(r => !r.is_comparable_reference).map(r => r.artist))].sort();
  list.innerHTML = artists.map(a => `<option value="${a}"></option>`).join('');
}

function renderChips() {
  const el = document.getElementById('compareChips');
  el.innerHTML = state.compareArtists.map((a, i) => `
    <span class="chip">
      <span class="dot" style="background:${COMPARE_PALETTE[i % COMPARE_PALETTE.length]}"></span>
      ${a}
      <button type="button" data-artist="${a}" aria-label="Remove ${a}">×</button>
    </span>
  `).join('');
  el.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.compareArtists = state.compareArtists.filter(a => a !== btn.dataset.artist);
      renderChips();
      renderAll();
    });
  });
  const searchBox = document.getElementById('searchBox');
  const comparing = state.compareArtists.length > 0;
  searchBox.disabled = comparing;
  searchBox.placeholder = comparing ? 'Clear comparison above to search all shows…' : 'Or just search/browse all shows…';
}

function addCompareArtist(name) {
  const match = [...new Set(state.onsales.map(r => r.artist))].find(
    a => a.toLowerCase() === name.trim().toLowerCase()
  );
  if (!match) return false;
  if (state.compareArtists.includes(match)) return false;
  if (state.compareArtists.length >= MAX_COMPARE) return false;
  state.compareArtists.push(match);
  renderChips();
  renderAll();
  return true;
}

let chart;
function renderChart() {
  const metric = document.getElementById('metricSelect').value;
  const hour = document.getElementById('hourSelect').value;
  const comparing = state.compareArtists.length > 0;
  const rows = filteredRecords()
    .map(r => ({ r, v: metricValue(r, metric, hour) }))
    .filter(x => x.v !== null && x.v !== undefined)
    .sort((a, b) => b.v - a.v)
    .slice(0, comparing ? 40 : 15);

  const ctx = document.getElementById('mainChart').getContext('2d');
  const labels = rows.map(x => `${x.r.artist} — ${x.r.venue}`);
  const data = rows.map(x => x.v);
  const colors = rows.map(x => comparing ? artistColor(x.r.artist) : '#6ea8fe');

  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: document.getElementById('metricSelect').selectedOptions[0].textContent,
        data,
        backgroundColor: colors,
        borderRadius: 4,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9aa2b1' }, grid: { color: '#2a2f3a' } },
        y: { ticks: { color: '#e7e9ee', font: { size: 11 } }, grid: { display: false } },
      },
    },
  });
}

function renderComparisonSummary() {
  const el = document.getElementById('comparisonSummary');
  if (state.compareArtists.length === 0) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  const metric = document.getElementById('metricSelect').value;
  const hour = document.getElementById('hourSelect').value;
  const metricLabel = document.getElementById('metricSelect').selectedOptions[0].textContent;
  const rows = filteredRecords().map(r => ({ r, v: metricValue(r, metric, hour) }));

  const perArtist = state.compareArtists.map((artist, i) => {
    const shows = rows.filter(x => x.r.artist === artist && x.v !== null && x.v !== undefined);
    if (!shows.length) {
      return { artist, color: COMPARE_PALETTE[i % COMPARE_PALETTE.length], count: 0 };
    }
    const top = shows.reduce((a, b) => (b.v > a.v ? b : a));
    const avg = shows.reduce((sum, x) => sum + x.v, 0) / shows.length;
    return {
      artist,
      color: COMPARE_PALETTE[i % COMPARE_PALETTE.length],
      count: shows.length,
      peak: top.v,
      peakShow: `${top.r.venue}${top.r.city ? ', ' + top.r.city : ''}`,
      avg,
    };
  });

  const withData = perArtist.filter(p => p.count > 0).sort((a, b) => b.peak - a.peak);

  let lines = perArtist.map(p => {
    if (!p.count) {
      return `<div class="artist-line"><span class="dot" style="background:${p.color}"></span>
        <span class="artist-name">${p.artist}</span>
        <span class="artist-stats">no shows match the current filters for ${metricLabel.toLowerCase()}</span></div>`;
    }
    return `<div class="artist-line"><span class="dot" style="background:${p.color}"></span>
      <span class="artist-name">${p.artist}</span>
      <span class="artist-stats">${p.count} show${p.count === 1 ? '' : 's'} — peak ${fmt(p.peak)} (${p.peakShow}), average ${fmt(Math.round(p.avg))}</span></div>`;
  }).join('');

  let takeaway = '';
  if (withData.length >= 2) {
    const top = withData[0];
    const bottom = withData[withData.length - 1];
    const ratio = bottom.peak > 0 ? (top.peak / bottom.peak).toFixed(1) : '—';
    takeaway = `<div class="takeaway"><strong>${top.artist}</strong> has the highest peak in this comparison at ${fmt(top.peak)}
      (${top.peakShow})${ratio !== '—' && ratio !== '1.0' ? `, ${ratio}× higher than ${bottom.artist}'s peak of ${fmt(bottom.peak)}` : ''}.
      Ranking by peak ${metricLabel.toLowerCase()}: ${withData.map(p => p.artist).join(' > ')}.</div>`;
  } else if (withData.length === 1) {
    takeaway = `<div class="takeaway">Add another artist to see a head-to-head comparison.</div>`;
  }

  el.style.display = 'block';
  el.innerHTML = `<p class="section-title">Comparison summary</p>${lines}${takeaway}`;
}

function renderTable() {
  const tbody = document.querySelector('#dataTable tbody');
  const hour = document.getElementById('hourSelect').value;
  let rows = filteredRecords().map(r => ({
    ...r,
    edp: valueAtHour(r, 'edp_views_by_hour', hour),
    adp: valueAtHour(r, 'adp_views_by_hour', hour),
  }));
  const { key, dir } = state.sort;
  rows.sort((a, b) => {
    let av = a[key], bv = b[key];
    if (av === null || av === undefined) av = -Infinity;
    if (bv === null || bv === undefined) bv = -Infinity;
    if (typeof av === 'string') return dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return dir === 'asc' ? av - bv : bv - av;
  });
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.artist}${r.anomaly ? ' <span class="badge anomaly-badge">anomaly</span>' : ''}</td>
      <td>${r.venue}</td>
      <td>${r.city || ''}</td>
      <td>${r.year || ''}</td>
      <td class="tier-${r.tier || ''}">${r.tier || '—'}</td>
      <td>${fmt(r.edp)}</td>
      <td>${fmt(r.adp)}</td>
      <td>${fmt(r.presale_peak_queue)}</td>
      <td>${fmt(r.onsale_peak_queue)}</td>
    </tr>
  `).join('') || '<tr><td colspan="9" class="empty">No shows match these filters.</td></tr>';
}

function renderInsights() {
  const el = document.getElementById('insights');
  if (!state.insights || !state.insights.insights || !state.insights.insights.length) {
    el.innerHTML = '<div class="empty">No precomputed insights yet — these are generated by Claude each time the scheduled sync runs. Once the GitHub Action has run at least once, they\'ll show up here.</div>';
    return;
  }
  el.innerHTML = state.insights.insights.map(i => `
    <div class="insight">
      <h4>${i.headline}</h4>
      <p>${i.detail}</p>
    </div>
  `).join('');
}

function renderAll() {
  // Each render step runs independently so a failure in one (e.g. the
  // charting library failing to load) doesn't blank out the rest of the page.
  try { renderChart(); } catch (e) { console.error('renderChart failed:', e); }
  try { renderTable(); } catch (e) { console.error('renderTable failed:', e); }
  try { renderInsights(); } catch (e) { console.error('renderInsights failed:', e); }
  try { renderComparisonSummary(); } catch (e) { console.error('renderComparisonSummary failed:', e); }
}

const compareInput = document.getElementById('compareInput');
compareInput.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const ok = addCompareArtist(compareInput.value);
  if (ok) compareInput.value = '';
});
compareInput.addEventListener('change', () => {
  const ok = addCompareArtist(compareInput.value);
  if (ok) compareInput.value = '';
});

document.querySelectorAll('#dataTable th').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (state.sort.key === key) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
    else state.sort = { key, dir: 'desc' };
    renderTable();
  });
});

['searchBox', 'metricSelect', 'hourSelect', 'tierSelect', 'yearSelect', 'excludeAnomalies'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderAll);
});

async function loadData() {
  try {
    const res = await fetch('data/onsales.json', { cache: 'no-store' });
    state.onsales = await res.json();
  } catch (e) {
    document.getElementById('lastSynced').textContent = 'Could not load data/onsales.json';
    return;
  }
  try {
    const res2 = await fetch('data/insights.json', { cache: 'no-store' });
    state.insights = await res2.json();
  } catch (e) {
    state.insights = null;
  }

  populateHourOptions();
  populateYearOptions();
  populateArtistOptions();

  const lastSyncTimes = state.onsales.map(r => r.last_synced).filter(Boolean).sort();
  const latest = state.insights?.generated_at || lastSyncTimes[lastSyncTimes.length - 1];
  document.getElementById('lastSynced').textContent = latest
    ? `Last synced ${new Date(latest).toLocaleString()}`
    : 'Seed data — no live sync yet';

  renderAll();
}

loadData();
</script>
</body>
</html>
